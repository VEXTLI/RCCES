<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Serenatas - RCCES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #b91c1c; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 pb-20">

    <!-- Indicador de Carga -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="loader mb-4"></div>
        <p class="text-red-700 font-bold animate-pulse">Sincronizando con la nube...</p>
    </div>

    <header class="bg-red-700 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="music" class="w-6 h-6 text-yellow-300"></i>
                <div>
                    <h1 class="text-lg font-bold leading-none">Ministerio de Canto</h1>
                    <p class="text-[10px] text-red-100 uppercase tracking-widest mt-1">RCCES - Serenatas</p>
                </div>
            </div>
            <div id="cloudStatus" class="flex items-center gap-1.5 text-[10px] bg-red-800 px-2 py-1 rounded-full border border-red-600">
                <span class="w-2 h-2 rounded-full bg-green-400"></span> 
                <span>SINCRO ACTIVA</span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">
        <!-- Dashboard -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="dashboard"></div>

        <!-- Ajustes -->
        <div class="bg-white p-4 rounded-xl border border-slate-200 mb-6 flex justify-between items-center shadow-sm">
            <div>
                <span class="text-sm font-semibold text-slate-600">Precio del Boleto</span>
                <p class="text-[10px] text-slate-400">Se actualiza para todos</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-slate-400">$</span>
                <input type="number" id="ticketPrice" class="w-20 text-center font-bold border-b-2 border-red-200 focus:border-red-500 outline-none">
            </div>
        </div>

        <!-- Tabla de Miembros -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-4">Miembro</th>
                            <th class="p-4 text-center">Boletos</th>
                            <th class="p-4 text-right">Monto</th>
                            <th class="p-4"></th>
                        </tr>
                    </thead>
                    <tbody id="membersTable" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal de Gestión -->
    <div id="ticketModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden fade-in flex flex-col max-h-[85vh]">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <div>
                    <h3 class="font-bold text-lg leading-tight" id="modalName"></h3>
                    <p class="text-[10px] text-slate-400" id="modalRange"></p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <div id="modalTicketsGrid" class="p-6 grid grid-cols-4 gap-3 overflow-y-auto"></div>
            <div class="p-5 border-t bg-slate-50 flex justify-between items-center">
                <span id="modalSummary" class="text-sm font-bold text-green-700"></span>
                <button onclick="closeModal()" class="bg-red-600 text-white px-5 py-2 rounded-lg text-sm font-bold">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN PROPORCIONADA POR EL USUARIO
        const firebaseConfig = {
            apiKey: "AIzaSyDeAEqs6rqFEvHpgZpA68KoKfCG0XxdeH4",
            authDomain: "serenatas-2cc3a.firebaseapp.com",
            projectId: "serenatas-2cc3a",
            storageBucket: "serenatas-2cc3a.firebasestorage.app",
            messagingSenderId: "511332970763",
            appId: "1:511332970763:web:7ff9ce9e34fb942f79f20e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "rcces", "boletos-v1"); // Documento único para todo el grupo

        const names = ["Doña Remi", "Lupita palma", "Yuli", "kike", "Emilio", "Ale García", "Ricardo", "Anita", "linda", "Toño Rivas", "Lucy", "Toño", "Shenny", "Felipe", "Ale", "Mario", "Lucero", "Alex", "Amairani", "Ángel", "Dani Eliza", "Gaby", "Brenda", "Iván", "Jessi", "Karla", "Linda", "Marcos", "Nico", "Nuri", "mateo"];
        
        window.state = { price: 50, members: [] };

        // Función para crear datos iniciales si la base está vacía
        function createInitialState() {
            let n = 1;
            return names.map((name, i) => {
                const qty = i < 4 ? 17 : 16;
                const m = { id: i, name, start: n, tickets: Array.from({length: qty}, (_, j) => ({n: n + j, s: false})) };
                n += qty;
                return m;
            });
        }

        // Sincronización en Tiempo Real
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                window.state = docSnap.data();
            } else {
                window.state.members = createInitialState();
                saveToCloud();
            }
            render();
            document.getElementById('loadingOverlay').classList.add('opacity-0');
            setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 500);
        });

        async function saveToCloud() {
            try {
                await setDoc(docRef, window.state);
            } catch (e) {
                console.error("Error guardando:", e);
                alert("Error: Verifica las reglas de Firestore.");
            }
        }

        function render() {
            const table = document.getElementById('membersTable');
            table.innerHTML = '';
            let totalSold = 0;

            document.getElementById('ticketPrice').value = window.state.price;

            window.state.members.forEach(m => {
                const sold = m.tickets.filter(t => t.s).length;
                totalSold += sold;
                table.innerHTML += `
                    <tr class="text-sm">
                        <td class="p-4">
                            <p class="font-bold text-slate-700">${m.name}</p>
                            <p class="text-[10px] text-slate-400">#${m.start}-${m.start + m.tickets.length - 1}</p>
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${sold === m.tickets.length ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">
                                ${sold}/${m.tickets.length}
                            </span>
                        </td>
                        <td class="p-4 text-right font-bold text-green-600">$${sold * window.state.price}</td>
                        <td class="p-4 text-right">
                            <button onclick="openModal(${m.id})" class="text-red-600 p-2 hover:bg-red-50 rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('dashboard').innerHTML = `
                <div class="bg-white p-4 rounded-xl border border-slate-200"><p class="text-[10px] uppercase font-bold text-slate-400">Vendidos</p><p class="text-xl font-bold">${totalSold}</p></div>
                <div class="bg-white p-4 rounded-xl border border-slate-200"><p class="text-[10px] uppercase font-bold text-slate-400">Pendientes</p><p class="text-xl font-bold text-orange-500">${500 - totalSold}</p></div>
                <div class="bg-white p-4 rounded-xl border border-slate-200"><p class="text-[10px] uppercase font-bold text-slate-400">Caja</p><p class="text-xl font-bold text-green-600">$${(totalSold * window.state.price).toLocaleString()}</p></div>
                <div class="bg-white p-4 rounded-xl border border-slate-200"><p class="text-[10px] uppercase font-bold text-slate-400">Meta</p><p class="text-xl font-bold text-slate-800">$${(500 * window.state.price).toLocaleString()}</p></div>
            `;
            lucide.createIcons();
            
            // Re-renderizar modal si está abierto
            if (window.currentModalId !== null) renderModalTickets(window.currentModalId);
        }

        window.openModal = (id) => {
            window.currentModalId = id;
            const m = window.state.members[id];
            document.getElementById('modalName').textContent = m.name;
            document.getElementById('modalRange').textContent = `Números del ${m.start} al ${m.start + m.tickets.length - 1}`;
            renderModalTickets(id);
            document.getElementById('ticketModal').classList.remove('hidden');
        };

        function renderModalTickets(id) {
            const m = window.state.members[id];
            const grid = document.getElementById('modalTicketsGrid');
            grid.innerHTML = '';
            let sold = 0;
            m.tickets.forEach((t, i) => {
                if(t.s) sold++;
                const b = document.createElement('button');
                b.className = `p-3 rounded-xl font-bold text-sm transition-all duration-200 ${t.s ? 'bg-green-500 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`;
                b.textContent = t.n;
                b.onclick = async () => { 
                    t.s = !t.s; 
                    render(); 
                    await saveToCloud(); 
                };
                grid.appendChild(b);
            });
            document.getElementById('modalSummary').textContent = `Recaudado: $${sold * window.state.price}`;
        }

        window.closeModal = () => {
            document.getElementById('ticketModal').classList.add('hidden');
            window.currentModalId = null;
        };

        document.getElementById('ticketPrice').onchange = async (e) => { 
            window.state.price = parseInt(e.target.value) || 0; 
            render(); 
            await saveToCloud();
        };

        window.currentModalId = null;
    </script>
</body>
</html>
